# Base infra (template: postgres only).
# Local: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brick}
      POSTGRES_DB: ${POSTGRES_DB:-brick}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brick} -d ${POSTGRES_DB:-brick}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
